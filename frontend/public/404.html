    html,body{height:100%}body{display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;color:#1f2937}

  <script>
    ;(function(){
      var target = '/index.html'
      if (location && location.origin) {
        target = location.origin + '/index.html'
      }
      setTimeout(function(){ location.replace(target) }, 0)
    })()
  </script>
